<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send to Pharmacy - HIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">
            <strong>HIS</strong> - Hospital Information System
        </a>
        <div class="navbar-nav ms-auto">
            <span class="navbar-text">
                <span th:if="${matrixConnected}" class="badge bg-light text-success">Connected</span>
                <span th:unless="${matrixConnected}" class="badge bg-danger">Disconnected</span>
            </span>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <!-- Alerts -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header bg-white">
                    <h5 class="mb-0">Send Message to Pharmacy</h5>
                    <small class="text-muted">Send a Communication to the Pharmacy via FHIR Messaging</small>
                </div>
                <div class="card-body">
                    <form th:action="@{/pharmacy/send}" method="post">
                        <div class="mb-3">
                            <label for="patientName" class="form-label"><strong>Patient Name</strong></label>
                            <input type="text" class="form-control" id="patientName" name="patientName"
                                   placeholder="e.g. Max Mustermann">
                        </div>

                        <div class="mb-3">
                            <label for="patientBirthDate" class="form-label"><strong>Patient Birth Date</strong></label>
                            <input type="date" class="form-control" id="patientBirthDate" name="patientBirthDate">
                        </div>

                        <div class="mb-3">
                            <label for="messageText" class="form-label">
                                <strong>Message</strong> <span class="text-danger">*</span>
                            </label>
                            <textarea class="form-control" id="messageText" name="messageText" rows="4" required
                                      placeholder="e.g. Please prepare medication for patient discharge..."></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary"
                                    th:disabled="${!matrixConnected}">
                                Send to Pharmacy
                            </button>
                            <a href="/" class="btn btn-outline-secondary">Cancel</a>
                        </div>

                        <div th:unless="${matrixConnected}" class="mt-3">
                            <small class="text-danger">Matrix connection required to send messages</small>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="mt-5 py-3 bg-white border-top">
    <div class="container text-center text-muted small">
        AT Messaging Implementation Guide - Proof of Concept
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
